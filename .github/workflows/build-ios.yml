name: Build iOS IPA (Unsigned)
on:
  workflow_dispatch:
    # 手動実行用ボタンを出す設定

jobs:
  build:
    runs-on: macos-latest # 最新のビルド環境を使用
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # --- ここを追加 ---
      - name: Set Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.1.app

      - name: Install dependencies
        run:
          # 署名なしビルドを邪魔する開発用パッケージを、ビルド時のみ一時的に削除します
          npm uninstall expo-dev-client expo-dev-launcher
          npm install

      - name: Install Expo CLI & Prebuild
        run: |
          # 開発用クライアントを含めないように、--no-install を付けて
          # 純粋なプロダクション（配布用）に近い状態で prebuild します
          npx expo prebuild --platform ios --no-install
          
          # その後、必要な Pods だけをインストール
          cd ios && pod install && cd ..

      - name: Build with Xcode (Unsigned)
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme myapp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -jobs 2 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ASSETCATALOG_COMPILER_SKIP_APP_ICON_CHECK=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            IPHONEOS_DEPLOYMENT_TARGET=15.1 | xcbeautify || { echo "Build Failed"; exit 1; }

      - name: Create Payload and IPA
        run: |
          # 以前の残骸を消去
          rm -rf Payload HouseholdBudget.ipa
          mkdir -p Payload
          
          # .appファイルを確実に抽出
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          
          # Payloadフォルダの中に.appをコピー
          cp -r "$APP_PATH" Payload/
          
          # SideStoreが認識できる形式でzip圧縮（拡張子をipaにする）
          zip -qr HouseholdBudget.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: HouseholdBudget.ipa
