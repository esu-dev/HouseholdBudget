name: Build iOS IPA (Unsigned)
on:
  workflow_dispatch:
    # 手動実行用ボタンを出す設定

jobs:
  build:
    runs-on: macos-latest # 最新のビルド環境を使用
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # --- ここを追加 ---
      - name: Set Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.1.app

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI & Prebuild
        run: |
          npx expo prebuild --platform ios

      - name: Build with Xcode (Unsigned)
        run: |
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme myapp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            IPHONEOS_DEPLOYMENT_TARGET=15.1 \
            -allowProvisioningUpdates \
            | xcbeautify || echo "Build continues despite warnings..."

      - name: Create Payload and IPA
        run: |
          mkdir -p Payload
          # build/Build/... の中にある .app を探す。パスが深いので慎重にコピー
          find build/Build/Products/Release-iphoneos -name "*.app" -exec cp -r {} Payload/ \;
          zip -r HouseholdBudget.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: HouseholdBudget.ipa
